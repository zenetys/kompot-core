define command {
    command_name check_snmp_fortigate_cpu
    command_line '$USER2$/centreon_plugins.pl' \
        --plugin network::fortinet::fortigate::snmp::plugin \
        --mode cpu \
        --cluster \
        --filter-perfdata-adv 'not(%(label) =~ "^[0-9]+#core")' \
        --hostname '$HOSTADDRESS$' \
        --snmp-timeout '$_SERVICE_TIMEOUT$' \
        --snmp-retries '$_SERVICE_RETRIES$' \
        $_HOST_CRED_SNMP_CENTREON$ \
        --warning-average '$_SERVICE_WARNING$' \
        --critical-average '$_SERVICE_CRITICAL$' \
        $_SERVICE_EXTRA_ARGS$
}

