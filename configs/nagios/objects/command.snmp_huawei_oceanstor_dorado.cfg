## HUAWEI OCEANSTOR / DORADO

## CONTROLLERS ##

define command {
    command_name check_snmp_huawei_oceanstor_dorado_controllers
    command_line $USER2$/centreon_plugins.pl \
        --plugin storage::huawei::oceanstor::snmp::plugin \
        --mode controllers \
        --hostname '$HOSTADDRESS$' \
        $_HOST_CRED_SNMP_CENTREON$ \
        --warning-memory-usage '$_SERVICE_WARNING_MEMORY$' \
        --warning-cpu-utilization '$_SERVICE_WARNING_CPU$' \
        --critical-memory-usage '$_SERVICE_CRITICAL_MEMORY$' \
        --critical-cpu-utilization '$_SERVICE_CRITICAL_CPU$' \
        --verbose
}

