# MSSQL

DEFAULT_SERVICE_TEMPLATE=generic-service

service mssql-default                --template    __PORT=56240

service mssql-backup-age             --template  use=mssql-default  check_command=check_mssql_backup_age            __database='(?!(master|model|msdb|tempdb)$).*'   __WARNING_EXECUTION=3 __CRITICAL_EXECUTION=5  \
                                                                                                                                                                      __WARNING_DURATION='' __CRITICAL_DURATION=''  \
                                                                                                                                                                      __WARNING_INCREMENTAL_EXECUTION='' __CRITICAL_INCREMENTAL_EXECUTION=''  \
                                                                                                                                                                      __WARNING_INCREMENTAL_DURATION='' __CRITICAL_INCREMENTAL_DURATION=''  \
                                                                                                                                                                      __WARNING_FULL_EXECUTION='' __CRITICAL_FULL_EXECUTION=''  \
                                                                                                                                                                      __WARNING_FULL_DURATION='' __CRITICAL_FULL_DURATION=''  \
                                                                                                                                                                      __WARNING_LOG_EXECUTION='' __CRITICAL_LOG_EXECUTION=''  \
                                                                                                                                                                      __WARNING_LOG_DURATION='' __CRITICAL_LOG_DURATION=''

service mssql-blocked-processes      --template  use=mssql-default  check_command=check_mssql_blocked_processes                                                       __WARNING='1'    __CRITICAL='5'     __WARNING_WAIT='' __CRITICAL_WAIT=''
service mssql-cache-hitratio         --template  use=mssql-default  check_command=check_mssql_cache_hitratio                                                          __WARNING='90:'  __CRITICAL='80:'
service mssql-collection             --template  use=mssql-default  check_command=check_mssql_collection
                                                                # Need configuration file
service mssql-connected-users        --template  use=mssql-default  check_command=check_mssql_connected_users                                                         __WARNING='120'  __CRITICAL='150'
service mssql-connection-time        --template  use=mssql-default  check_command=check_mssql_connection_time                                                         __WARNING='50'   __CRITICAL='100'
service mssql-databases-size         --template  use=mssql-default  check_command=check_mssql_databases_size        __database='.*'                                   __WARNING='80'   __CRITICAL='90'
service mssql-dead-locks             --template  use=mssql-default  check_command=check_mssql_dead_locks            __database='(?!(master|model|msdb|tempdb)$).*'    __WARNING='0.1'  __CRITICAL='1'
service mssql-failed-jobs            --template  use=mssql-default  check_command=check_mssql_failed_jobs                                                             __WARNING='1'    __CRITICAL='2'
service mssql-list-databases         --template  use=mssql-default  check_command=check_mssql_list_databases        __database='.*'
service mssql-locks-waits            --template  use=mssql-default  check_command=check_mssql_locks_waits           __database='(?!(master|model|msdb|tempdb)$).*'    __WARNING='5'    __CRITICAL='10'
service mssql-page-life-expectancy   --template  use=mssql-default  check_command=check_mssql_page_life_expectancy
service mssql-sql                    --template  use=mssql-default  check_command=check_mssql_sql
service mssql-sql-string             --template  use=mssql-default  check_command=check_mssql_sql_string
service mssql-tables                 --template  use=mssql-default  check_command=check_mssql_tables                __database='.*'                                   __WARNING='80'   __CRITICAL='90'
service mssql-transactions           --template  use=mssql-default  check_command=check_mssql_transactions          __database='.*'                                   __WARNING='100'  __CRITICAL='120'
