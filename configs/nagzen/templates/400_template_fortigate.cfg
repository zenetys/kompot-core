## Fortigate

host fortigate:linux --template
  service CPU:generic-snmp-service check_command=check_snmp_fortigate_cpu
  service MEM:generic-snmp-service check_command=check_snmp_fortigate_mem
  service HARDWARE:generic-snmp-service check_command=check_snmp_fortigate_hardware
  service IPS-STATS:generic-snmp-service check_command=check_snmp_fortigate_ips_stats
  service SESSIONS:generic-snmp-service check_command=check_snmp_fortigate_sessions
  service VIRUS:generic-snmp-service check_command=check_snmp_fortigate_virus
  service VPN:generic-snmp-service check_command=check_snmp_fortigate_vpn

  service CLOCK --disable
  service DISK --disable
  service HOSTNAME --disable
  service LOAD --disable
  service NB-PROCESS --disable
  service SWAP --disable
