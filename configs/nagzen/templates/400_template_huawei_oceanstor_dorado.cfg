# SERVICES
DEFAULT_SERVICE_TEMPLATE=generic-snmp-service

service custom-oceanstor-controllers  --template check_command='check_snmp_huawei_oceanstor_dorado_controllers' __WARNING_MEMORY='99' __CRITICAL_MEMORY='100' __WARNING_CPU='95' __CRITICAL_CPU='99'
service custom-oceanstor-power        --template check_command='check_snmp_huawei_oceanstor_dorado_power'
service custom-oceanstor-fan          --template check_command='check_snmp_huawei_oceanstor_dorado_fan'
service custom-oceanstor-expboard     --template check_command='check_snmp_huawei_oceanstor_dorado_expboard'
service custom-oceanstor-enclosure    --template check_command='check_snmp_huawei_oceanstor_dorado_enclosure' __WARNING_TEMP="65" __CRITICAL_TEMP='70'
service custom-oceanstor-storage-pools  --template check_command='check_snmp_huawei_oceanstor_dorado_storage-pools' __WARNING="90" __CRITICAL='95'
#service custom-oceanstor-luns  --template check_command='check_snmp_huawei_oceanstor_dorado_luns' __WARNING="90" __CRITICAL='95'
service custom-oceanstor-luns-status  --template check_command='check_snmp_huawei_oceanstor_dorado_luns-status'

DEFAULT_SERVICE_TEMPLATE=generic-service

# SERVICES

# HOST TEMPLATE
host dorado:snmp --template
        service OS-SIGNATURE --disable
        service ADM-HTTPS __PORT=8088
        service CONTROLLERS:custom-oceanstor-controllers
        service POWER:custom-oceanstor-power
        service FAN:custom-oceanstor-fan
        service EXPBOARD:custom-oceanstor-expboard
        service ENCLOSURE:custom-oceanstor-enclosure
        service STORAGE-POOLS:custom-oceanstor-storage-pools
        service LUNS-STATUS:custom-oceanstor-luns-status
