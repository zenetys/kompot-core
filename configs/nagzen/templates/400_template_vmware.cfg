## VMWare / VCSA VCenter

DEFAULT_SERVICE_TEMPLATE=generic-snmp-service

service snmp-vcsa-cpu --template \
    check_command=check_snmp_vcsa_cpu \
    __SNMP_RETRIES=2 \
    __SNMP_TIMEOUT=3 \
    __WARNING_AVERAGE=70 \
    __CRITICAL_AVERAGE=80 \
    __WARNING_CORE= \
    __CRITICAL_CORE=

service snmp-vcsa-mem --template \
    check_command=check_snmp_vcsa_mem \
    __SNMP_RETRIES=2 \
    __SNMP_TIMEOUT=3 \
    __WARNING=80 \
    __CRITICAL=90

service snmp-vcsa-network --template \
    check_command=check_snmp_vcsa_network \
    __SNMP_RETRIES=2 \
    __SNMP_TIMEOUT=3 \
    __WARNING_IN_TRAFFIC=70 \
    __CRITICAL_IN_TRAFFIC=80 \
    __WARNING_OUT_TRAFFIC=70 \
    __CRITICAL_OUT_TRAFFIC=80

DEFAULT_SERVICE_TEMPLATE=generic-service

# Template supervision via Agent VMWare
service api-vsphere-auth --template __CONNECTOR_HOSTNAME='127.0.0.1' __CONNECTOR_PORT='5700'
#ESX
service alarm-host:api-vsphere-auth --template check_command='check_vsphere_host' __MODE='alarm-host'
service cpu-host:api-vsphere-auth --template check_command='check_vsphere_host' __MODE='cpu-host'
service health-host:api-vsphere-auth --template check_command='check_vsphere_host' __MODE='health-host'
service maintenance-host:api-vsphere-auth --template check_command='check_vsphere_host' __MODE='maintenance-host'
service status-host:api-vsphere-auth --template check_command='check_vsphere_host' __MODE='status-host'
#VM
service cpu-vm:api-vsphere-auth --template check_command='check_vsphere_vm' __MODE='cpu-vm'
service mem-vm:api-vsphere-auth --template check_command='check_vsphere_vm' __MODE='memory-vm'
service net-vm:api-vsphere-auth --template check_command='check_vsphere_vm' __MODE='net-vm'
service snapshot-vm:api-vsphere-auth --template check_command='check_vsphere_vm' __MODE='snapshot-vm'
service tools-vm:api-vsphere-auth --template check_command='check_vsphere_vm_tools' __MODE='tools-vm'
service status-vm:api-vsphere-auth --template check_command='check_vsphere_vm' __MODE='status-vm'
service thinprovisioning-vm:api-vsphere-auth --template check_command='check_vsphere_vm' __MODE='thinprovisioning-vm'


host vcenter:linux --template
    service DISK:snmp-windows-storage # OID Disk similaires aux OID Windows
    service CPU:snmp-vcsa-cpu
    service MEM:snmp-vcsa-mem
    service NETWORK:snmp-vcsa-network
    service NB-PROCESS __WARNING=350 __CRITICAL=550
    service SWAP --disable
    service LOAD --disable

host esx:vcenter --template
    service CLOCK:snmp-date-utc
    service ADM-SSH --disable
    service ALARM:alarm-host
    service HEALTH:health-host
    service MAINTENANCE:maintenance-host
    service STATUS:status-host
    service V-CPU:cpu-host

## Prévoir d'ajouter les templates VM
