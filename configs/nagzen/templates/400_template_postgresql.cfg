# PostgreSQL

DEFAULT_SERVICE_TEMPLATE=generic-service

service postgres-default                --template    __PORT=5432

service postgres-backends               --template  use=postgres-default  check_command=check_postgresql_backends         __exclude='template\d+'
service postgres-bloat                  --template  use=postgres-default  check_command=check_postgresql_bloat
service postgres-collection             --template  use=postgres-default  check_command=check_postgresql_collection
                                                                # Need configuration file
service postgres-connection-time        --template  use=postgres-default  check_command=check_postgresql_connection_time                                  __warning='100' __critical='150' 
service postgres-database-size          --template  use=postgres-default  check_command=check_postgresql_database_size    __database='(?!template\d+$).*'
service postgres-hitratio               --template  use=postgres-default  check_command=check_postgresql_hitratio         __exclude='^template\d+$'       __warning='80:' __critical='60:'
service postgres-list-databases         --template  use=postgres-default  check_command=check_postgresql_list_databases                                                               
service postgres-locks                  --template  use=postgres-default  check_command=check_postgresql_locks            __exclude='^template\d+$'                                   
service postgres-query-time             --template  use=postgres-default  check_command=check_postgresql_query_time       __exclude='^template\d+$'       __warning='1'   __critical='2'   
                                                                 # Bug Centreon sur le mode querty_time : threshold W/C not recognized
service postgres-sql                    --template  use=postgres-default  check_command=check_postgresql_sql
service postgres-sql-string             --template  use=postgres-default  check_command=check_postgresql_sql_string
service postgres-statistics             --template  use=postgres-default  check_command=check_postgresql_statistics       __database='^(?!template\d+$).*'
service postgres-tablespace             --template  use=postgres-default  check_command=check_postgresql_tablespace
service postgres-timesync               --template  use=postgres-default  check_command=check_postgresql_timesync
service postgres-vacuum                 --template  use=postgres-default  check_command=check_postgresql_vacuum
