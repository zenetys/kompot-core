# Minimal Nagios configuration for nagzen test validation
# This file is used by the test runner to validate generated configs
# Placeholders are replaced at runtime by the test runner

# Logging (disabled for tests)
log_file=/dev/null
debug_file=/dev/null

# Required paths (placeholders replaced at runtime)
check_result_path=WORK_DIR_PLACEHOLDER
state_retention_file=WORK_DIR_PLACEHOLDER/retention.dat
temp_file=WORK_DIR_PLACEHOLDER/nagios.tmp
temp_path=WORK_DIR_PLACEHOLDER
lock_file=WORK_DIR_PLACEHOLDER/nagios.lock
object_cache_file=WORK_DIR_PLACEHOLDER/objects.cache
precached_object_file=WORK_DIR_PLACEHOLDER/objects.precache
status_file=WORK_DIR_PLACEHOLDER/status.dat

# Illegal characters setting
illegal_macro_output_chars=`~$&|'"<>

# Basic settings
nagios_user=USER_PLACEHOLDER
nagios_group=GROUP_PLACEHOLDER
check_external_commands=0
command_check_interval=-1
retain_state_information=0
use_retained_program_state=0
use_retained_scheduling_info=0

# Disable all active checks during validation
execute_service_checks=0
execute_host_checks=0
accept_passive_service_checks=0
accept_passive_host_checks=0

# Disable notifications
enable_notifications=0

# Disable event handlers
enable_event_handlers=0

# Disable flap detection
enable_flap_detection=0

# Disable performance data
process_performance_data=0

# Include test harness objects (commands, timeperiods, contacts, templates)
cfg_file=HARNESS_FILE_PLACEHOLDER

# Include generated objects to validate
cfg_file=OBJECTS_FILE_PLACEHOLDER
