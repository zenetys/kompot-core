# Test: Concrete host service override
# Validates that concrete hosts can override service attributes

# Base template
host linux --template

# Template with service default
host mytemplate:linux --template
  service ADM-SSH __PORT=22

# Concrete host overrides service attribute
host myserver:mytemplate --address=192.168.1.100
  service ADM-SSH __PORT=2222

# ASSERT service:myserver:ADM-SSH:__PORT=2222
