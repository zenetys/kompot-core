# Test: Concrete host with same name as its parent template
#
# This is a valid use case: the template is _linux and the
# concrete host is linux (no underscore prefix).
# No collision should occur.

host linux --template
  service CPU
  service MEM

host linux:linux --address=192.168.1.1

