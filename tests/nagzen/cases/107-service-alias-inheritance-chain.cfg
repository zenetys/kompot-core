# Test: Inheritance chain with service alias
#
# This test verifies inheritance behavior when a service uses
# an alias (SWAP:snmp-linux-swap) vs direct declaration.
#
# Structure tested:
# 1. Service template: snmp-linux-swap with check_command
# 2. Host template linux: service SWAP:snmp-linux-swap
# 3. Concrete host: override SWAP with __WARNING

# Define service template with check_command
service snmp-test-swap --template check_command=check-dummy __WARNING=80 __CRITICAL=90

# Base template
host os --template

# Host template with service alias
host test-linux:os --template
  service TEST-SWAP:snmp-test-swap

# Concrete host that overrides
host myhost:test-linux --address=10.0.0.1
  service TEST-SWAP __WARNING=50

# ASSERT service:myhost:TEST-SWAP:check_command=check-dummy
# ASSERT service:myhost:TEST-SWAP:__WARNING=50
