# Test: Host template inheritance chain
# Validates multi-level host inheritance

# Root template
host ping --template

# Inheritance chain
host level1:ping --template
  service PING

host level2:level1 --template
  service ADM-SSH

host level3:level2 --template
  service CPU

# Concrete host at end of chain
host final:level3 --address=10.0.0.1

