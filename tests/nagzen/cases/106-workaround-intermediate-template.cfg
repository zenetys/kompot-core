# Test: Workaround with intermediate template
#
# WORKAROUND: Since reopening an existing template was not possible,
# the solution was to create an intermediate template.
#
# Instead of modifying "linux" directly, create "linux-custom"
# that inherits from linux and overrides values.
#
# Note: This workaround is no longer necessary since template
# reopening is now supported.

# Base template
host os --template

# Simulate base linux template
host linux:os --template
  service ADM-SSH __PORT=22

# Workaround: intermediate template
host linux-ssh2244:linux --template
  service ADM-SSH __PORT=2244

# Host using the workaround
host myserver:linux-ssh2244 --address=192.168.1.1

# ASSERT service:myserver:ADM-SSH:__PORT=2244
