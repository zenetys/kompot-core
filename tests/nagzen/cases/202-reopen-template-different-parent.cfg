# Test: Reopening template with different parent is allowed
#
# When reopening a template with a different parent, the parent
# is changed. The user knows what they're doing.

host base --template
  service BASE-SVC

host other --template
  service OTHER-SVC

host linux:base --template
  service CPU

# Reopen with different parent - parent is changed to 'other'
host linux:other --template
  service MEM

# Concrete host to verify: linux now inherits from other, not base
host server1:linux --address=10.0.0.1

# ASSERT service:server1:MEM:check_command=check-dummy
# ASSERT service:server1:OTHER-SVC:check_command=check-dummy
