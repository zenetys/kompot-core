# Test: Deep inheritance with multiple SSH port overrides
#
# Tests service attribute inheritance through multiple template levels,
# each overriding the SSH port.
#
# Inheritance chain:
#   os -> linux (__PORT=22) -> custom (__PORT=2222)
#
# Then linux is reopened to override __PORT=2244
# All concrete hosts are declared at the end.

# Base template
host os --template

# First level: linux with SSH port 22
host linux:os --template
  service ADM-SSH __PORT=22

# Second level: custom overrides SSH port to 2222
host custom:linux --template
  service ADM-SSH __PORT=2222

# Reopen linux: override SSH port to 2244
host linux --template
  service ADM-SSH __PORT=2244

# All concrete hosts declared after all template definitions
host myserver1:os --address=192.168.1.1
host myserver2:linux --address=192.168.1.2
host myserver3:custom --address=192.168.1.3
host myserver4:linux --address=192.168.1.4

# ASSERT service:myserver2:ADM-SSH:__PORT=2244
# ASSERT service:myserver3:ADM-SSH:__PORT=2222
# ASSERT service:myserver4:ADM-SSH:__PORT=2244
