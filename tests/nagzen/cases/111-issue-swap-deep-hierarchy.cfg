# Test: SWAP vs NB-PROCESS comparison with deep hierarchy
#
# This test compares SWAP and NB-PROCESS behavior
# on a host with multiple levels of template inheritance.
#
# SWAP is defined with alias in linux: service SWAP:snmp-linux-swap
# NB-PROCESS is defined without alias in linux: service NB-PROCESS __WARNING=300 __CRITICAL=330

# Service template for SWAP
service snmp-linux-swap --template check_command=check-dummy __WARNING=80 __CRITICAL=90

# Base linux template
host linux --template
  service SWAP:snmp-linux-swap
  service NB-PROCESS __WARNING=300 __CRITICAL=330
  service ADM-SSH __PORT=22

# First level inheritance
host custom-linux:linux --template
  service ADM-SSH __PORT=2222

# Second level inheritance (no override)
host my-custom:custom-linux --template

# Concrete host at end of chain
host myserver:my-custom --address=10.0.0.1
  service SWAP __WARNING=50 __CRITICAL=80
  service NB-PROCESS __WARNING=200

# ASSERT service:myserver:SWAP:check_command=check-dummy
# ASSERT service:myserver:SWAP:__WARNING=50
# ASSERT service:myserver:NB-PROCESS:__WARNING=200
# ASSERT service:myserver:ADM-SSH:__PORT=2222
