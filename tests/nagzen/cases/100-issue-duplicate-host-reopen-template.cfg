# Test: Reopen existing template to override attributes
# but at runtime the last definition wins (override by inheritance).
#
# FIXED: Template can now be reopened to override service attributes.
# Mechanism: Override by inheritance - a new service template definition
# is emitted with updated attributes, Nagios uses the last definition.
#
# Use case: In /etc/kompot/nagzen/999_inventory.cfg, user wants to
# override the default SSH port of the linux template defined in
# /opt/kompot/lib/nagzen/100_template_linux.cfg

# Initial template definition (simulates 100_template_linux.cfg)
host linux --template
  service ADM-SSH __PORT=22
  service CPU

# Reopen template to override service attribute
host linux --template
  service ADM-SSH __PORT=2244

# Concrete host to validate the override
host myserver:linux --address=10.0.0.1

# ASSERT service:myserver:ADM-SSH:__PORT=2244
# ASSERT service:myserver:CPU:check_command=check-dummy
