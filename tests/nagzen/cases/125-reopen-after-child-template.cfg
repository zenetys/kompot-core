# Test: Reopen parent template after child template defined
#
# Scenario:
# 1. linux is defined with ADM-SSH (uses adm-ssh template with __PORT=22)
# 2. debian:linux is defined
# 3. linux is reopened to override __PORT=2244
# 4. All concrete hosts declared after all reopens
#
# Expected behavior (no freeze):
# - Both supi1:debian and supi2:linux get __PORT=2244
# - The reopen propagates to all templates in the chain

service ADM-SSH --template __PORT=22

host linux --template
  service ADM-SSH

# debian defined BEFORE linux reopen
host debian:linux --template

# linux reopen happens AFTER debian (but before concrete hosts)
host linux --template
  service ADM-SSH __PORT=2244

# Both hosts get PORT=2244 (no freeze)
host supi1:debian --address=127.0.0.2 __TAGS=tag1
host supi2:linux --address=127.0.0.3 __TAGS=tag2

# ASSERT service:supi1:ADM-SSH:__PORT=2244
# ASSERT service:supi2:ADM-SSH:__PORT=2244
