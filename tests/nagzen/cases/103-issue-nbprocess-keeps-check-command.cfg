# Test: Override NB-PROCESS service - check_command inheritance
#
# COMPARISON: Unlike SWAP, NB-PROCESS keeps its check_command when overridden.
#
# The NB-PROCESS service is defined in linux template as:
#   service NB-PROCESS __WARNING=300 __CRITICAL=330
# (no alias, inherits directly from generic-service)
#
# Hypothesis: The difference in behavior comes from:
# - SWAP uses an alias (SWAP:snmp-linux-swap)
# - NB-PROCESS is declared without explicit alias in linux template

# Template with direct service declaration (no alias)
host linux --template
  service NB-PROCESS __WARNING=300 __CRITICAL=330

# Concrete host overriding NB-PROCESS
host testhost:linux --address=192.168.1.1
  service NB-PROCESS __WARNING=111

# ASSERT service:testhost:NB-PROCESS:check_command=check-dummy
# ASSERT service:testhost:NB-PROCESS:__WARNING=111
