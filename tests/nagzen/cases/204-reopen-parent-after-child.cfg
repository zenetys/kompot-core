# Test: Modify parent template after child was defined
#
# Scenario:
# 1. base template with BASE-SVC
# 2. linux:base with CPU
# 3. base reopened with ADM-SSH __PORT=4444
# 4. Does linux/server1 get ADM-SSH?

host base --template
  service BASE-SVC

host linux:base --template
  service CPU

# Reopen parent AFTER child was defined
host base --template
  service ADM-SSH __PORT=4444

# Concrete host - should have ADM-SSH (propagated from base)
host server1:linux --address=10.0.0.1

# ASSERT service:server1:ADM-SSH:__PORT=4444
# ASSERT service:server1:CPU:check_command=check-dummy
# ASSERT service:server1:BASE-SVC:check_command=check-dummy
