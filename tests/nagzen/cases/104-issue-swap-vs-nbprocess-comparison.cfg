# Test: SWAP vs NB-PROCESS comparison on same host
#
# Compares SWAP and NB-PROCESS behavior when overriding on same host
#
# SWAP (with alias :snmp-linux-swap) -> inherits via host template hierarchy
# NB-PROCESS (no alias) -> inherits via host template hierarchy
#
# This test allows comparing both behaviors side by side

# Service template for SWAP alias
service snmp-linux-swap --template check_command=check-dummy __WARNING=80 __CRITICAL=90

# Template with both services
host linux --template
  service SWAP:snmp-linux-swap
  service NB-PROCESS __WARNING=300 __CRITICAL=330

# Concrete host overriding both services
host testhost:linux --address=192.168.1.1
  service SWAP __WARNING=100 __CRITICAL=190
  service NB-PROCESS __WARNING=111

# ASSERT service:testhost:SWAP:check_command=check-dummy
# ASSERT service:testhost:SWAP:__WARNING=100
# ASSERT service:testhost:NB-PROCESS:check_command=check-dummy
# ASSERT service:testhost:NB-PROCESS:__WARNING=111
