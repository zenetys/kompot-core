# Test: Service with alias (display:template)
# Validates service aliasing works correctly

# Service templates to use as aliases
service snmp-linux-cpu --template check_command=check-dummy
service snmp-linux-mem --template check_command=check-dummy

# Base template
host linux --template

# Template with aliased services
host myhost:linux --template
  service MY-CPU:snmp-linux-cpu
  service MY-MEM:snmp-linux-mem __WARNING=80

# Concrete host to validate
host server1:myhost --address=10.0.0.1

# ASSERT service:server1:MY-CPU:check_command=check-dummy
# ASSERT service:server1:MY-MEM:__WARNING=80
