# Test: Reopen template after it was re-parented
#
# Scenario:
# 1. linux:base with CPU
# 2. linux:other (re-parent) with MEM → creates _linux__1
# 3. linux --template with ADM-SSH → which version is modified?

host base --template
  service BASE-SVC

host other --template
  service OTHER-SVC

host linux:base --template
  service CPU

# Re-parent: creates _linux__1
host linux:other --template
  service MEM

# Reopen without parent - which version is modified?
host linux --template
  service ADM-SSH __PORT=2222

# Concrete host to see the result
host server1:linux --address=10.0.0.1

# ASSERT service:server1:ADM-SSH:__PORT=2222
# ASSERT service:server1:MEM:check_command=check-dummy
# ASSERT service:server1:OTHER-SVC:check_command=check-dummy
