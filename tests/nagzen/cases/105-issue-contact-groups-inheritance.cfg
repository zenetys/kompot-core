# Test: contact_groups additive (+) inheritance on services
#
# When a service uses contact_groups=+grp, nagzen should resolve the "+"
# by looking at the host's explicit contact_groups (walking up the use chain).
#
# Rules:
# - Only use the host's contact_groups if explicitly defined
# - Walk up the host template chain (use= order) to find it
# - If found: replace +grp with <host_cg>,grp
# - If not found: keep +grp as-is (Nagios handles via service template chain)
# - No effect on services without contact_groups or without "+" prefix

# === Case 1: host has explicit contact_groups ===
host linux --template
  service NB-PROCESS __WARNING=300 __CRITICAL=330

host testhost1:linux --address=192.168.1.1 contact_groups=admins
  service NB-PROCESS __WARNING=111 contact_groups=+grp_test

# === Case 2: host template has contact_groups, concrete host doesn't ===
host infra --template contact_groups=ops
  service DISK __WARNING=80 __CRITICAL=90

host testhost2:infra --address=192.168.1.2
  service DISK contact_groups=+grp_test

# === Case 3: no contact_groups anywhere in host chain ===
host bare --template
  service CPU __WARNING=80 __CRITICAL=90

host testhost3:bare --address=192.168.1.3
  service CPU contact_groups=+grp_test

# === Case 4: service without contact_groups (no change) ===
host testhost4:linux --address=192.168.1.4
  service NB-PROCESS __WARNING=222

# === Case 5: service with explicit contact_groups without + (no change) ===
host testhost5:linux --address=192.168.1.5
  service NB-PROCESS __WARNING=333 contact_groups=only_this

# === Case 6: cascading =+ on host AND service ===
# host template has contact_groups=default
# concrete host adds contact_groups=+sms  → should resolve to default,sms
# service adds contact_groups=+phone      → should resolve to default,sms,phone
host base6 --template contact_groups=default
  service SQL __WARNING=50

host testhost6:base6 --address=192.168.1.6 contact_groups=+sms
  service SQL contact_groups=+phone

# ASSERT service:testhost1:NB-PROCESS:contact_groups=grp_test,admins
# ASSERT service:testhost2:DISK:contact_groups=grp_test,ops
# ASSERT service:testhost4:NB-PROCESS:__WARNING=222
# ASSERT service:testhost5:NB-PROCESS:contact_groups=only_this
# ASSERT service:testhost6:SQL:contact_groups=phone,sms,default
