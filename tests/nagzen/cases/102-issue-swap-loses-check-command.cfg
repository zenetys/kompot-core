# Test: Override SWAP service - check_command inheritance
#
# Verifies that when overriding the SWAP service on a concrete host,
# it keeps its check_command (check_snmp_linux_swap, not return-unknown)
#
# The SWAP service is defined in linux template as:
#   service SWAP:snmp-linux-swap
# where snmp-linux-swap has check_command=check_snmp_linux_swap
#
# Expected: SWAP service must keep check_command=check-dummy
#           and only override __WARNING

# Service template with check_command
service snmp-linux-swap --template check_command=check-dummy __WARNING=80 __CRITICAL=90

# Template using aliased service
host linux --template
  service SWAP:snmp-linux-swap

# Concrete host overriding SWAP
host testhost:linux --address=192.168.1.1
  service SWAP __WARNING=100

# ASSERT service:testhost:SWAP:check_command=check-dummy
# ASSERT service:testhost:SWAP:__WARNING=100
