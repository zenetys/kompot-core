# Test: Explicit child override vs parent reopen
#
# Scenario:
# 1. linux with ADM-SSH __PORT=22
# 2. debian:linux with ADM-SSH __PORT=2222 (explicit override)
# 3. linux reopened with ADM-SSH __PORT=4444
# 4. server1:debian - which port?
#
# Answer: debian keeps its explicit 2222 (override preserved)

host linux --template
  service ADM-SSH __PORT=22

host debian:linux --template
  service ADM-SSH __PORT=2222

host linux --template
  service ADM-SSH __PORT=4444

host server1:debian --address=10.0.0.1
host server2:linux --address=10.0.0.2

# ASSERT service:server1:ADM-SSH:__PORT=2222
# ASSERT service:server2:ADM-SSH:__PORT=4444
