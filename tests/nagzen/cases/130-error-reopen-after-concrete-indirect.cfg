# EXPECT_ERROR
# Test: Error when reopening template after indirect concrete host
#
# Validates that a template cannot be reopened after a concrete host
# has been declared using a CHILD template (indirect inheritance).
#
# Scenario:
# 1. Template chain: os -> linux -> debian
# 2. server1:debian declared (uses linux indirectly via debian)
# 3. Attempt to reopen linux -> MUST FAIL
#    (because linux is an ancestor of debian which has concrete hosts)

host os --template

host linux:os --template
  service ADM-SSH __PORT=22

host debian:linux --template

# Concrete host using debian (indirectly uses linux and os)
host server1:debian --address=10.0.0.1

# This reopen MUST fail (linux has indirect concrete hosts via debian)
host linux --template
  service ADM-SSH __PORT=2244
