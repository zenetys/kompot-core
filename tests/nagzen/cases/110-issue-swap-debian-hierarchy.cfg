# Test: Real scenario - SWAP on debian host with deep hierarchy
#
# Reproduction of reported bug:
# - Host vipi inherits from debian2244 which inherits from linux
# - When overriding SWAP, it should keep its check_command
#
# Expected inheritance chain:
#   vipi:SWAP -> _debian2244:swap -> _linux:swap -> snmp-linux-swap
#   (with check_command=check-dummy)

# Service template with check_command
service snmp-linux-swap --template check_command=check-dummy __WARNING=80 __CRITICAL=90

# Base linux template with SWAP service
host linux --template
  service SWAP:snmp-linux-swap
  service ADM-SSH __PORT=22

# Debian inherits from linux
host debian:linux --template

# Intermediate template
host debian2244:debian --template
  service ADM-SSH __PORT=2244

# Concrete host that overrides SWAP
host vipi:debian2244 --address=192.168.0.1
  service SWAP __WARNING=100

# ASSERT service:vipi:SWAP:check_command=check-dummy
# ASSERT service:vipi:SWAP:__WARNING=100
# ASSERT service:vipi:ADM-SSH:__PORT=2244
