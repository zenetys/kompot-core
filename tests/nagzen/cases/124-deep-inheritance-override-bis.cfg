# Test: Deep hierarchy with template reopens and propagation
#
# Sequence:
#   1. linux defined with ADM-SSH
#   2. debian:linux defined
#   3. linux reopened - overrides ADM-SSH __PORT=2244
#   4. debian:linux reopened (updates to latest linux version)
#
# Expected behavior (propagation):
# - Both supi1:debian and supi2:linux get __PORT=2244

service ADM-SSH --template __PORT=22

host ping --template
host snmp:ping --template
host os:snmp --template
host linux:os --template
  service ADM-SSH

# debian defined BEFORE linux reopen
host debian:linux --template

# linux reopen AFTER debian - overrides ADM-SSH port
host linux --template
  service ADM-SSH __PORT=2244

# debian reopen AFTER linux reopen - creates new intermediate template
host debian:linux --template __TAGS=debian

# Both get PORT=2244 (debian reopened after linux, so it updates)
host supi1:debian --address=127.0.0.2 __TAGS=tag1
host supi2:linux --address=127.0.0.3 __TAGS=tag2

# ASSERT service:supi1:ADM-SSH:__PORT=2244
# ASSERT service:supi2:ADM-SSH:__PORT=2244
