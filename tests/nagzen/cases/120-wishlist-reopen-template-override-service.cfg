# Test: Reopen template to override service attributes
#
# FIXED: This test now passes with template reopening support.
#
# Scenario:
# 1. Template "linux" already exists
# 2. Override SSH port from 22 to 2244 for ALL linux hosts
# 3. Create concrete host inheriting from linux
#
# Previous behavior: FATAL "duplicate host linux"
# Current behavior: ADM-SSH service has __PORT=2244

# Initial template definition
host linux --template
  service ADM-SSH __PORT=22
  service CPU

# Reopen linux template to override SSH port
host linux --template
  service ADM-SSH __PORT=2244

# Concrete host to verify inheritance
host myserver:linux --address=10.0.0.1

# ASSERT service:myserver:ADM-SSH:__PORT=2244
# ASSERT service:myserver:CPU:check_command=check-dummy
