# Test: Reopen template to disable a service
#
# Scenario:
# 1. Template "snmp" defined with HOSTNAME, UPTIME
# 2. Template "linux:snmp" defined
# 3. snmp reopened to disable HOSTNAME (propagates to all children)
# 4. Concrete host inherits from linux
#
# Expected behavior:
# - myserver:linux does NOT have HOSTNAME (disabled by snmp reopen)
# - UPTIME and CPU are still present

# Initial template definitions
host snmp --template
  service HOSTNAME
  service UPTIME

host linux:snmp --template
  service CPU

# Reopen snmp template to disable HOSTNAME
host snmp --template
  service HOSTNAME --disable

# Concrete host - HOSTNAME should be disabled
host myserver:linux --address=10.0.0.1

