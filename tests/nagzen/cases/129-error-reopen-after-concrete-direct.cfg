# EXPECT_ERROR
# Test: Error when reopening template after direct concrete host
#
# Validates that a template cannot be reopened after a concrete host
# has been declared using that template DIRECTLY.
#
# Scenario:
# 1. linux template defined with ADM-SSH
# 2. server1:linux declared (direct usage)
# 3. Attempt to reopen linux -> MUST FAIL

host linux --template
  service ADM-SSH __PORT=22

# Concrete host declared directly using linux
host server1:linux --address=10.0.0.1

# This reopen MUST fail
host linux --template
  service ADM-SSH __PORT=2244
