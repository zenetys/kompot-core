# Test: Standalone service template
# Validates service templates outside of host blocks

# Standalone service template
service my-custom-check --template check_command=check-dummy __WARNING=80 __CRITICAL=95

# Base template
host linux --template

# Template using standalone service
host myhost:linux --template
  service CUSTOM:my-custom-check

# Concrete host to validate
host server1:myhost --address=10.0.0.1
