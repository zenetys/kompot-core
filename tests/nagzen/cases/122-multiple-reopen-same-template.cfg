# Test: Multiple reopenings of the same template
#
# Verifies that the same template can be reopened multiple times
# to override different services or the same service multiple times.
#
# Note: All reopens must happen BEFORE any concrete host declaration.
# Concrete hosts are created at the end to validate the final state.

# Initial template definition
host linux --template
  service ADM-SSH __PORT=22
  service CPU __WARNING=80

# First reopening: override ADM-SSH with port 2244
host linux --template
  service ADM-SSH __PORT=2244

# Second reopening: override CPU with warning 90
host linux --template
  service CPU __WARNING=90

# Third reopening: re-override ADM-SSH with port 2222
host linux --template
  service ADM-SSH __PORT=2222

# All concrete hosts declared after all reopens
# Final state: ADM-SSH: __PORT=2222, CPU: __WARNING=90
host server1:linux --address=10.0.0.1
host server2:linux --address=10.0.0.2
host server3:linux --address=10.0.0.3

# ASSERT service:server1:ADM-SSH:__PORT=2222
# ASSERT service:server1:CPU:__WARNING=90
# ASSERT service:server2:ADM-SSH:__PORT=2222
# ASSERT service:server3:ADM-SSH:__PORT=2222
