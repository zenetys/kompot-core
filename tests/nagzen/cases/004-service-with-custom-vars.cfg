# Test: Service with custom variables
# Validates __CUSTOM variables are properly included

# Base template
host linux --template

# Template with custom vars on services
host monitored:linux --template
  service ADM-SSH __PORT=2222
  service CPU __WARNING=75 __CRITICAL=90

# Concrete host to validate
host myserver:monitored --address=10.0.0.1

# ASSERT service:myserver:ADM-SSH:__PORT=2222
# ASSERT service:myserver:CPU:__WARNING=75
# ASSERT service:myserver:CPU:__CRITICAL=90
