# Test: Concrete host service disable
# Validates that concrete hosts can disable inherited services

# Base template with services
host linux --template
  service ADM-SSH __PORT=22
  service CPU
  service MEM

# Concrete host disables CPU service
host myserver:linux --address=192.168.1.100
  service CPU --disable

