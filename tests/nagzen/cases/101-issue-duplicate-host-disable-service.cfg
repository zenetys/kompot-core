# Test: Disable service on existing template
#
# FIXED: Template can now be reopened to disable a service.
# The HOSTNAME service is disabled for all hosts inheriting from snmp.
# The disabled state propagates through the template inheritance hierarchy.
#
# Use case: Globally disable the HOSTNAME service from the snmp template

# Initial template definition (simulates 050_template_common.cfg)
host snmp --template
  service HOSTNAME
  service UPTIME

# Reopen template to disable HOSTNAME service
host snmp --template
  service HOSTNAME --disable

# Concrete host to validate (HOSTNAME should be absent)
host myserver:snmp --address=10.0.0.1

# ASSERT service:myserver:UPTIME:check_command=check-dummy
# ASSERT !service:myserver:HOSTNAME:
