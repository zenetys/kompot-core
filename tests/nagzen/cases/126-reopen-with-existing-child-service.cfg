# Test: Reopen with explicit child service declaration
#
# Scenario:
# 1. linux is defined with ADM-SSH
# 2. debian:linux explicitly declares ADM-SSH
# 3. linux is reopened to override ADM-SSH port
# 4. debian is reopened (updates to new parent reference)
# 5. All concrete hosts declared at the end
#
# Expected behavior (no freeze):
# - All hosts get __PORT=2244 (propagated through all templates)

service ADM-SSH --template __PORT=22

host linux --template
  service ADM-SSH

# debian explicitly declares ADM-SSH
host debian:linux --template
  service ADM-SSH

# linux reopen - overrides ADM-SSH port
host linux --template
  service ADM-SSH __PORT=2244

# debian reopen - updates to use the new linux version
host debian:linux --template

# All concrete hosts declared after all reopens
host debian1:debian --address=127.0.0.3
  service DUMMY
host supi1:debian --address=127.0.0.1
host supi2:linux --address=127.0.0.2

# ASSERT service:debian1:ADM-SSH:__PORT=2244
# ASSERT service:supi1:ADM-SSH:__PORT=2244
# ASSERT service:supi2:ADM-SSH:__PORT=2244
