# Nagios Test Harness - Minimal objects for nagzen test validation

# Timeperiod (required)
define timeperiod {
    timeperiod_name     24x7
    alias               24x7
    sunday              00:00-24:00
    monday              00:00-24:00
    tuesday             00:00-24:00
    wednesday           00:00-24:00
    thursday            00:00-24:00
    friday              00:00-24:00
    saturday            00:00-24:00
}

# Command (required)
define command {
    command_name    check-dummy
    command_line    /bin/true
}

# Contact (required)
define contact {
    contact_name                    admin
    alias                           Admin
    service_notification_period     24x7
    host_notification_period        24x7
    service_notification_options    w,u,c,r
    host_notification_options       d,r
    service_notification_commands   check-dummy
    host_notification_commands      check-dummy
}

define contactgroup {
    contactgroup_name   admins
    alias               Admins
    members             admin
}

define contactgroup {
    contactgroup_name   grp_test
    alias               Test Group
    members             admin
}

define contactgroup {
    contactgroup_name   ops
    alias               Operations
    members             admin
}

define contactgroup {
    contactgroup_name   default
    alias               Default
    members             admin
}

define contactgroup {
    contactgroup_name   sms
    alias               SMS Alerts
    members             admin
}

define contactgroup {
    contactgroup_name   phone
    alias               Phone Alerts
    members             admin
}

define contactgroup {
    contactgroup_name   only_this
    alias               Only This
    members             admin
}

# Base host template
define host {
    name                    generic-host
    check_command           check-dummy
    max_check_attempts      3
    notification_period     24x7
    contact_groups          admins
    register                0
}

# Base service template
define service {
    name                    generic-service
    check_command           check-dummy
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_period     24x7
    contact_groups          admins
    register                0
}

# Dummy host/service (Nagios requires at least 1 of each)
define host {
    host_name       nagzen-test-dummy
    alias           Dummy
    address         127.0.0.1
    use             generic-host
}

define service {
    host_name               nagzen-test-dummy
    service_description     DUMMY
    use                     generic-service
}
